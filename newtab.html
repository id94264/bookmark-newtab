<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新标签页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="top-bar">
    <nav id="breadcrumb"></nav>
    
    <button id="settings-btn" class="icon-btn" title="个性化设置">
      <svg class="settings-svg" viewBox="0 0 24 24">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </button>
  </header>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h3>书签新标签页设置</h3>
      <hr>
      
      <div class="setting-group">
        <div class="setting-header" id="toggle-home-tree">
          <span>🏠 设置默认首页</span>
          <span class="arrow">▶</span>
        </div>
        <div id="home-tree-container" class="tree-wrapper hidden"></div>
      </div>

      <div class="setting-group">
        <div class="setting-header" id="toggle-range-tree">
          <span>👁️ 设置显示范围 (取消勾选即隐藏)</span>
          <span class="arrow">▶</span>
        </div>
        <div id="range-tree-container" class="tree-wrapper hidden"></div>
      </div>

      <button id="save-settings">保存并应用</button>
    </div>
  </div>

  <main id="app">
    <div id="bookmarks-container" class="grid-container"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
